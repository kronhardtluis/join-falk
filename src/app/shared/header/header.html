<main>
  <section>
    <div>
      <img id="logo" src="assets/icons/logo.png" alt="Logo" />
      <p>Kanban Project Management Tool</p>
    </div>
    @if(dbService.logingStatus()!='nobody'){
      <div id="header-navigation">
        <a id="help" routerLinkActive="help-hidden" routerLink="help"><img src="assets/icons/help.png" alt="Help" /></a>
        <button id="user" (click)="toggleMenu(); $event.stopPropagation()">{{dbService.getInitials(dbService.logedUser())}}</button>
      </div>

      <div class="dropdown" (click)="$event.stopPropagation()" [class.open]="isMenuOpen">
        <div class="dropdown-content">
          <a id="help-responsive" routerLink="help">Help</a>
          <a routerLink="legal-notice" (click)="closeMenu()">Legal Notice</a>
          <a routerLink="privacy-policy" (click)="closeMenu()">Privacy Policy</a>
          <a routerLink="" (click)="closeMenu(); logOut()">Log out</a>
        </div>
      </div>
    }
  </section>
</main>
