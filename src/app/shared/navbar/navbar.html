<main>
  <section>
    <section id="menu">
      <div id="logo">
        <img src="assets/icons/logo-light.png" alt="Logo" />
      </div>

      <div>
        <nav>
          @if(oAuthService.logingStatus() != 'nobody'){
            <a routerLink="summary" routerLinkActive="active" class="navigation">
              <img src="assets/icons/summary.png" alt="Summary" />
              <span>Summary</span>
            </a>

            <a routerLink="add-task" routerLinkActive="active" class="navigation">
              <img src="assets/icons/add-task.png" alt="Add Task" />
              <span>Add Task</span>
            </a>

            <a routerLink="board" routerLinkActive="active" class="navigation">
              <img src="assets/icons/board.png" alt="Board" />
              <span>Board</span>
            </a>

            <a routerLink="contacts" routerLinkActive="active" class="navigation">
              <img src="assets/icons/contacts.png" alt="Contacts" />
              <span>Contacts</span>
            </a>
          } @else {
            <a routerLink="/" class="navigation">
              <img src="assets/icons/login.png" alt="Login" />
              <span>Log In</span>
            </a>
          }
        </nav>
      </div>
    </section>

    <section id="legal-links">
      <a routerLinkActive="active" routerLink="privacy-policy">Privacy Policy</a>
      <a routerLinkActive="active" routerLink="legal-notice">Legal Notice</a>
    </section>
  </section>
</main>
