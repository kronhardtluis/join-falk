@if(oAuthService.logingStatus() === "nobody" && oAuthService.activeSite() === "log-in"){
  <div class="content auth-mode">
    <router-outlet />
  </div>
} @else {
  <app-navbar class="navbar"></app-navbar>
  <app-header class="header"></app-header>
  <div class="content">
    <router-outlet />
  </div>
}

<div id="notification-msg" [class.show]="dbService.notificationMessage()">
  <span>{{ dbService.notificationMessage() }}</span>
</div>
