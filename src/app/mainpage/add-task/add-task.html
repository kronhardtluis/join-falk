<h2>Add Task</h2>

<form id="form">
  <div class="content">
    <h3>Title <span>*</span></h3>
    <input placeholder="Enter a Title" type="text" />

    <h3>Description</h3>
    <textarea placeholder="Enter a Description" name="description" id="description"></textarea>

    <h3>Due date<span>*</span></h3>
    <input id="due-date" type="date" [min]="minDate" />
  </div>

  <div id="big-line"></div>

  <div class="content">
    <h3>Prio</h3>
    <div id="priorities">
      <button class="importance">
        <p>urgent</p>
        <img src="assets/icons/urgent-red.png" alt="" />
      </button>
      <button class="importance">
        <p>medium</p>
        <img src="assets/icons/medium-orange.png" alt="" />
      </button>
      <button class="importance">
        <p>low</p>
        <img src="assets/icons/low-green.png" alt="" />
      </button>
    </div>

    <h3>Assigned to</h3>
    <!-- #region - Kontakte laden. Wie? -->
    <div id="assign-contacts">
      <input placeholder="Select contacts to assign" id="select-contact" />
      <button class="drop-down" id="open-contacts">
        <img src="assets/icons/drop-down.png" alt="drop-down" />
      </button>
      <!-- beide Checkboxen sind drin -->
      <ul class="list">
        <li>2 Checkboxen -> <img src="assets/icons/cheackbox.png" alt="checkbox"><img src="assets/icons/cheackbox-white.png" alt="checked checkbox"></li>
        <li>Angelo Mertel <img src="assets/icons/cheackbox.png" alt="checkbox"><img src="assets/icons/cheackbox-white.png" alt="checked checkbox"></li>
        <li>Max Mustermann <img src="assets/icons/cheackbox.png" alt="checkbox"><img src="assets/icons/cheackbox-white.png" alt="checked checkbox"></li>
      </ul>
      <div id="assigned-contacts">
        <p>HS</p>
        <p>AM</p>
        <p>MM</p>
      </div>
    </div>
    <!-- #endregion -->

    <h3>Category<span>*</span></h3>
    <div id="category-block">
      <input placeholder="Select Task Category" id="category" />
      <button class="drop-down" id="open-categories">
        <img src="assets/icons/drop-down.png" alt="drop-down" />
      </button>
      <ul class="list">
        <li>Herbert Schröde</li>
        <li>Angelo Mertel</li>
        <li>Max Mustermann</li>
      </ul>
    </div>

    <h3>Subtasks</h3>
    <div id="subtask-block">
      <input id="add-subtask" type="text" placeholder="Add new Subtask" />
      <button (click)="addSubtask()" id="add-button">
        <img src="assets/icons/check-blue.png" alt="check" />
      </button>
      <div id="small-line"></div>
      <button (click)="clearSubtask()" id="delete-button">
        <img src="assets/icons/close-blue.png" alt="close" />
      </button>
    </div>
  </div>
</form>

<div id="bottom">
  <p id="declaration"><span>*</span> this field is required</p>
  <div id="buttons">
    <button id="clear">
      Clear
      <img id="unhovered" src="assets/icons/close-blue.png" alt="" />
      <img id="hovered" src="assets/icons/close-light-blue.png" alt="" />
    </button>
    <button id="create">
      Create Task
      <img src="assets/icons/check-white.png" alt="" />
    </button>
  </div>
</div>
